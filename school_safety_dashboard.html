<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>학교안전사고 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1a3a5c;--blue:#2e6fa3;--sky:#5b9bd5;
  --red:#e05c2a;--gold:#f5a623;--green:#27ae60;
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#1a202c;--muted:#718096;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto}

/* ── 상단바 ── */
.topbar{background:var(--navy);padding:12px 16px 0;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.topbar-title{color:#fff;font-size:15px;font-weight:600}
.role-toggle{display:flex;gap:1px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px}
.role-btn{padding:4px 12px;border-radius:16px;border:none;font-size:11px;font-weight:500;cursor:pointer;transition:.2s;color:rgba(255,255,255,.7);background:transparent}
.role-btn.active{background:#fff;color:var(--navy)}
.tab-row{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:8px 14px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}

/* ── 로딩 ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:var(--muted);font-size:13px}
.progress-bar{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}

/* ── 설정 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--navy)}
.modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:12px}
.modal input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.modal input:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer}
.btn-primary{background:var(--navy);color:#fff}
.btn-secondary{background:var(--bg);color:var(--text)}

/* ── 콘텐츠 ── */
.content{padding:0;min-height:calc(100vh - 80px)}
.view{display:none;padding:12px}
.view.active{display:block}

/* ── 카드 ── */
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card-title{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title i{font-size:14px}

/* ── KPI 그리드 ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.kpi-value{font-size:20px;font-weight:700;color:var(--navy)}
.kpi-value.red{color:var(--red)}
.kpi-value.blue{color:var(--blue)}
.kpi-value.green{color:var(--green)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── 경보 박스 ── */
.alert-box{background:#fff5f5;border:1px solid #fed7d7;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.alert-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.alert-title{font-size:13px;font-weight:600;color:var(--red)}
.alert-desc{font-size:11px;color:#c53030;margin-top:2px}

/* ── 센서 그리드 ── */
.sensor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sensor{background:var(--card);border-radius:10px;padding:10px 12px;border:1px solid var(--border);position:relative}
.sensor-name{font-size:10px;color:var(--muted);margin-bottom:4px}
.sensor-val{font-size:22px;font-weight:700}
.sensor-val.danger{color:var(--red)}
.sensor-val.warn{color:var(--gold)}
.sensor-val.safe{color:var(--green)}
.sensor-status{font-size:10px;margin-top:2px}
.sensor-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:10px;right:10px}
.dot-red{background:var(--red);animation:pulse 1.5s infinite}
.dot-yellow{background:var(--gold)}
.dot-green{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 바 차트 ── */
.bar-list{display:flex;flex-direction:column;gap:7px}
.bar-item{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--muted);width:60px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.bar-val{font-size:11px;color:var(--text);width:36px;text-align:right;font-weight:500}

/* ── 타임라인 ── */
.timeline{display:flex;flex-direction:column;gap:8px}
.tl-item{display:flex;gap:10px;align-items:flex-start}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tl-dot.red{background:var(--red)}
.tl-dot.gold{background:var(--gold)}
.tl-dot.green{background:var(--green)}
.tl-dot.blue{background:var(--blue)}
.tl-title{font-size:12px;font-weight:500;color:var(--text)}
.tl-desc{font-size:11px;color:var(--muted)}

/* ── 뱃지 ── */
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;margin-left:4px}
.badge-red{background:#fff5f5;color:var(--red)}
.badge-gold{background:#fffbeb;color:#b7791f}
.badge-green{background:#f0fff4;color:#276749}
.badge-blue{background:#ebf8ff;color:var(--blue)}

/* ── AI 예측 ── */
.predict-card{background:linear-gradient(135deg,#fff8f5,#fff);border:1px solid #fed7c7;border-radius:12px;padding:14px;margin-bottom:10px}
.predict-title{font-size:11px;color:var(--red);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.predict-meter{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}
.predict-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--red))}
.predict-result{font-size:16px;font-weight:700;color:var(--navy)}
.predict-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── 태그 선택 ── */
.tag-group{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:.2s}
.tag.sel{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── 스테이지 카드 ── */
.stage-row{display:flex;gap:6px;margin-bottom:8px}
.stage{flex:1;border-radius:8px;padding:8px 6px;border:1px solid var(--border)}
.stage.s1{background:#fff5f5;border-color:#fed7d7}
.stage.s2{background:#ebf8ff;border-color:#bee3f8}
.stage.s3{background:#f0fff4;border-color:#c6f6d5}
.stage-lbl{font-size:9px;font-weight:600;margin-bottom:2px}
.stage.s1 .stage-lbl{color:var(--red)}
.stage.s2 .stage-lbl{color:var(--blue)}
.stage.s3 .stage-lbl{color:var(--green)}
.stage-val{font-size:11px;font-weight:600;color:var(--navy)}
.stage-desc{font-size:9px;color:var(--muted)}

/* ── 테이블형 행 ── */
.row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--muted)}
.row-val{font-size:13px;font-weight:600;color:var(--navy)}
.row-val.green{color:var(--green)}
.row-val.red{color:var(--red)}

/* ── 모델 뱃지 ── */
.model-chip{background:#ebf8ff;border:1px solid #bee3f8;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.model-chip-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.model-chip-title{font-size:11px;font-weight:600;color:var(--navy)}
.model-chip-desc{font-size:10px;color:var(--muted)}

/* ── 에러 ── */
.error-box{background:#fff5f5;border:1px solid #fed7d7;border-radius:10px;padding:16px;text-align:center;margin:12px}
.error-box h3{color:var(--red);font-size:14px;margin-bottom:6px}
.error-box p{color:var(--muted);font-size:12px;line-height:1.6}
.error-box code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:11px;word-break:break-all}

/* ── 차트 컨테이너 ── */
.chart-wrap{position:relative;height:180px;margin-top:8px}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-row">
    <div class="topbar-title">🏫 학교안전 대시보드</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="openSettings()" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px">⚙️</button>
      <div class="role-toggle">
        <button class="role-btn active" id="btn-teacher" onclick="setRole('teacher')">교사용</button>
        <button class="role-btn" id="btn-admin" onclick="setRole('admin')">관리자</button>
      </div>
    </div>
  </div>
  <div class="tab-row" id="tab-row"></div>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">⚙️ GitHub 데이터 설정</div>
    <label>GitHub 사용자명</label>
    <input id="gh-user" placeholder="예: seokhunn" value="">
    <label>저장소 이름</label>
    <input id="gh-repo" placeholder="예: school-safety-data" value="">
    <label>브랜치</label>
    <input id="gh-branch" placeholder="예: main" value="main">
    <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--muted);line-height:1.7">
      파일명은 아래와 같이 저장소에 업로드하세요:<br>
      <code style="background:#fff;padding:1px 4px;border-radius:3px">2021-2025_학교안전사고_보상_데이터.xlsx</code><br>
      <code style="background:#fff;padding:1px 4px;border-radius:3px">2021-2025_학교안전사고_데이터.xlsx</code><br>
      <code style="background:#fff;padding:1px 4px;border-radius:3px">온도.csv</code> &nbsp;
      <code style="background:#fff;padding:1px 4px;border-radius:3px">강우량.csv</code><br>
      <code style="background:#fff;padding:1px 4px;border-radius:3px">손상기전별_응급실_이용.csv</code>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeSettings()">취소</button>
      <button class="btn btn-primary" onclick="saveAndLoad()">저장 후 로드</button>
    </div>
  </div>
</div>

<!-- 콘텐츠 영역 -->
<div class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="load-text" id="load-text">GitHub 설정을 입력해 주세요</div>
    <button class="btn btn-primary" style="margin-top:8px;padding:10px 24px;border-radius:10px" onclick="openSettings()">⚙️ 설정 열기</button>
  </div>
</div>

<script>
// ── 전역 상태 ────────────────────────────────────────────────
let STATE = {
  role: 'teacher',
  tab: 0,
  ghUser: localStorage.getItem('ghUser') || '',
  ghRepo: localStorage.getItem('ghRepo') || '',
  ghBranch: localStorage.getItem('ghBranch') || 'main',
  data: null,
  charts: {}
};

// ── 탭 정의 ──────────────────────────────────────────────────
const TABS = {
  teacher: ['📡 IoT 실시간', '🗺️ 위험 도면', '📋 사고 신고'],
  admin:   ['📊 전국 현황', '🧠 AI 분석', '💰 재정·전략']
};

// ── 설정 모달 ─────────────────────────────────────────────────
function openSettings() {
  document.getElementById('gh-user').value = STATE.ghUser;
  document.getElementById('gh-repo').value = STATE.ghRepo;
  document.getElementById('gh-branch').value = STATE.ghBranch;
  document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveAndLoad() {
  STATE.ghUser = document.getElementById('gh-user').value.trim();
  STATE.ghRepo = document.getElementById('gh-repo').value.trim();
  STATE.ghBranch = document.getElementById('gh-branch').value.trim() || 'main';
  localStorage.setItem('ghUser', STATE.ghUser);
  localStorage.setItem('ghRepo', STATE.ghRepo);
  localStorage.setItem('ghBranch', STATE.ghBranch);
  closeSettings();
  loadData();
}

// ── GitHub Raw URL ────────────────────────────────────────────
function raw(filename) {
  return `https://raw.githubusercontent.com/${STATE.ghUser}/${STATE.ghRepo}/${STATE.ghBranch}/${encodeURIComponent(filename)}`;
}

// ── 데이터 로딩 ───────────────────────────────────────────────
async function loadData() {
  if (!STATE.ghUser || !STATE.ghRepo) {
    setLoadText('GitHub 설정을 입력해 주세요', 0);
    return;
  }
  setLoadText('데이터 로딩 중...', 10);
  try {
    // 보상 데이터 (5개 시트)
    setLoadText('보상 데이터 로딩 중...', 20);
    const compBuf = await fetchBinary(raw('2021-2025_학교안전사고_보상_데이터.xlsx'));
    const compWb = XLSX.read(compBuf, {type:'array'});

    setLoadText('발생 데이터 로딩 중...', 40);
    const accBuf = await fetchBinary(raw('2021-2025_학교안전사고_데이터.xlsx'));
    const accWb = XLSX.read(accBuf, {type:'array'});

    setLoadText('기상 데이터 로딩 중...', 60);
    const [tempCsv, rainCsv] = await Promise.all([
      fetchText(raw('온도.csv')),
      fetchText(raw('강우량.csv'))
    ]);

    setLoadText('응급의료 데이터 로딩 중...', 80);
    const nedisCsv = await fetchText(raw('손상기전별_응급실_이용.csv'));

    setLoadText('데이터 분석 중...', 90);
    STATE.data = processData(compWb, accWb, tempCsv, rainCsv, nedisCsv);

    setLoadText('완료!', 100);
    setTimeout(renderApp, 300);
  } catch(e) {
    showError(e.message);
  }
}

async function fetchBinary(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`파일 로드 실패: ${url.split('/').pop()} (${res.status})`);
  const ab = await res.arrayBuffer();
  return new Uint8Array(ab);
}
async function fetchText(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`파일 로드 실패: ${url.split('/').pop()}`);
  return res.text();
}

function setLoadText(msg, pct) {
  document.getElementById('load-text').textContent = msg;
  document.getElementById('progress').style.width = pct + '%';
}
function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="error-box">
      <h3>⚠️ 데이터 로드 실패</h3>
      <p>${msg}</p>
      <p style="margin-top:8px">GitHub 저장소가 <b>Public</b>인지 확인하고,<br>파일명이 정확한지 확인해 주세요.</p>
      <button class="btn btn-primary" style="margin-top:12px;padding:10px 20px;border-radius:8px" onclick="openSettings()">⚙️ 설정 수정</button>
    </div>`;
}

// ── 데이터 처리 ───────────────────────────────────────────────
function processData(compWb, accWb, tempCsv, rainCsv, nedisCsv) {
  const years = [2021,2022,2023,2024,2025];
  let comp = [], acc = [];

  years.forEach(y => {
    if (compWb.SheetNames.includes(String(y))) {
      const rows = XLSX.utils.sheet_to_json(compWb.Sheets[String(y)]);
      rows.forEach(r => { r.연도 = y; comp.push(r); });
    }
    if (accWb.SheetNames.includes(String(y))) {
      const rows = XLSX.utils.sheet_to_json(accWb.Sheets[String(y)]);
      rows.forEach(r => { r.연도 = y; acc.push(r); });
    }
  });

  // 총지급액 & 중증도
  const 급여컬럼 = ['요양급여','장해급여','간병급여','유족급여','장례비','위로금','보전비용'];
  comp.forEach(r => {
    r.총지급액 = 급여컬럼.reduce((s,k) => s + (Number(r[k])||0), 0);
    r.중증도 = (r.장해급여>0||r.간병급여>0||r.유족급여>0||r.총지급액>=5000000) ? 2
             : r.총지급액>=100000 ? 1 : 0;
  });

  // 연도별 집계
  const byYear = {};
  years.forEach(y => {
    const rows = comp.filter(r=>r.연도===y);
    byYear[y] = {
      건수: rows.length,
      지급액: rows.reduce((s,r)=>s+r.총지급액,0),
      중증: rows.filter(r=>r.중증도===2).length
    };
  });

  // 학교급별
  const bySchool = {};
  comp.forEach(r => {
    const k = r['학교급'];
    if (!bySchool[k]) bySchool[k] = {건수:0,중증:0,지급액:0};
    bySchool[k].건수++;
    if(r.중증도===2) bySchool[k].중증++;
    bySchool[k].지급액 += r.총지급액;
  });

  // 고등학교 사고시간별
  const hs = comp.filter(r=>r['학교급']==='고등학교');
  const byTime = {};
  hs.forEach(r => {
    const k = r['사고시간'];
    if (!byTime[k]) byTime[k] = {건수:0,중증:0,지급액:0};
    byTime[k].건수++;
    if(r.중증도===2) byTime[k].중증++;
    byTime[k].지급액 += r.총지급액;
  });

  // 지역별 우선순위 점수
  const byRegion = {};
  hs.forEach(r => {
    const k = r['지역'];
    if (!byRegion[k]) byRegion[k] = {건수:0,중증:0,지급액:0};
    byRegion[k].건수++;
    if(r.중증도===2) byRegion[k].중증++;
    byRegion[k].지급액 += r.총지급액;
  });
  const regions = Object.entries(byRegion).map(([지역,v])=>({지역,...v}));
  const maxC=Math.max(...regions.map(r=>r.건수));
  const maxS=Math.max(...regions.map(r=>r.중증));
  const maxA=Math.max(...regions.map(r=>r.지급액));
  regions.forEach(r=>{
    r.점수 = ((r.중증/maxS)*0.5 + (r.건수/maxC)*0.3 + (r.지급액/maxA)*0.2);
  });
  regions.sort((a,b)=>b.점수-a.점수);

  // 기상 파싱 (간단 CSV)
  function parseKmaCsv(csv, col) {
    const rows=[];
    const lines=csv.split('\n');
    let started=false;
    for(const line of lines){
      if(line.startsWith('년월')) { started=true; continue; }
      if(started && line.includes(',')) {
        const p=line.split(',').map(s=>s.trim());
        if(p[0] && p[0].includes('-')) {
          const [y,m]=p[0].split('-');
          const v=parseFloat(p[2]);
          if(!isNaN(v)) rows.push({연도:parseInt(y),월:parseInt(m),[col]:v});
        }
      }
    }
    return rows;
  }
  const temps = parseKmaCsv(tempCsv,'평균기온');
  const rains = parseKmaCsv(rainCsv,'강수량');

  // 연도별 기상 평균
  const weatherByYear = {};
  years.forEach(y=>{
    const t=temps.filter(r=>r.연도===y);
    const r=rains.filter(r=>r.연도===y);
    weatherByYear[y]={
      평균기온: t.length ? (t.reduce((s,r)=>s+r.평균기온,0)/t.length) : 0,
      연강수량: r.reduce((s,rr)=>s+rr.강수량,0),
      결빙월수: t.filter(r=>r.월<=2||r.월===12).filter(r=>r.평균기온<0).length,
      폭염월수: t.filter(r=>r.월>=7&&r.월<=8).filter(r=>r.평균기온>26).length
    };
  });

  const total5y = comp.length;
  const total5y지급 = comp.reduce((s,r)=>s+r.총지급액,0);
  const total중증 = comp.filter(r=>r.중증도===2).length;

  return { comp, acc, byYear, bySchool, byTime, regions, weatherByYear,
           total5y, total5y지급, total중증, hs };
}

  STATE.role = role;

function setTab(idx) {
  STATE.tab = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));

    const el=document.getElementById(id);
    if(el) el.classList.remove('active');
  });

  if(target) target.classList.add('active');
  setTimeout(()=>renderCharts(role, idx), 100);
}

function updatePrediction() {
  const d=STATE.data;
  const place=document.querySelector('.tag.sel[data-group="place"]')?.textContent;
  const body=document.querySelector('.tag.sel[data-group="body"]')?.textContent;
  const time=document.querySelector('.tag.sel[data-group="time"]')?.textContent;

  // 선택 조건 기반 중증비율 추정
  const hs=d.hs;
  let filtered=hs;
  if(place) filtered=filtered.filter(r=>r['사고장소']&&r['사고장소'].includes(place));
  if(time) filtered=filtered.filter(r=>r['사고시간']===time);
  if(filtered.length===0) filtered=hs;

  const 중증비율=filtered.filter(r=>r.중증도===2).length/filtered.length*100;
  const 중상비율=filtered.filter(r=>r.중증도===1).length/filtered.length*100;
  const 평균지급=filtered.reduce((s,r)=>s+r.총지급액,0)/filtered.length;

  let level, color, 범위;
  if(중증비율>3){level='중증 위험 높음';color='var(--red)';범위='200만원 이상';}
  else if(중상비율>60){level=`중상 가능성 ${Math.round(중상비율)}%`;color='#b7791f';범위=`${Math.round(평균지급/10000*0.7)}~${Math.round(평균지급/10000*1.2)}만원`;}
  else{level='경상 가능성 높음';color='var(--green)';범위='10만원 미만';}

  const pct=Math.min(Math.max(중상비율+중증비율*3, 10), 95);
  document.getElementById('predict-bar').style.width=pct+'%';
  document.getElementById('predict-val').textContent=level;
  document.getElementById('predict-val').style.color=color;
  document.getElementById('predict-sub').textContent=`예상 지급액: ${범위} | 분석 ${filtered.length.toLocaleString()}건 기반`;
}

          <div style="font-size:12px;font-weight:600;color:var(--navy)">체육수업 준비운동 의무화</div>
          <span class="badge badge-green">비용 0원</span>
        </div>
        <div style="font-size:11px;color:var(--muted)">축구 중증 356건 · 연간 절감 기대 30.7억원</div>
      </div>
      <div style="background:var(--bg);border-radius:8px;padding:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="font-size:12px;font-weight:600;color:var(--navy)">진로활동 체크리스트</div>
          <span class="badge badge-green">비용 0원</span>
        </div>
        <div style="font-size:11px;color:var(--muted)">중증비율 5.53% · 연간 절감 기대 2.9억원</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 B/C 분석</div>
      <div class="row-item"><span class="row-label">저비용 연간 절감 합계</span><span class="row-val green">33.6억원</span></div>
      <div class="row-item"><span class="row-label">IoT 전국 보급 (현실적)</span><span class="row-val red">~28억원</span></div>
      <div class="row-item" style="border:none"><span class="row-label">B/C ratio</span><span class="row-val green">2.09</span></div>
    </div>
    <div class="card">
      <div class="card-title">📍 지역별 우선순위 점수</div>
      <div class="bar-list" id="region-bars"></div>
    </div>`;
  views.appendChild(a2);
}

// ── 차트 렌더링 ───────────────────────────────────────────────
function renderCharts(role, tab) {
  if (!STATE.data) return;
  const d = STATE.data;

  if (role==='teacher' && tab===0) {
    // 시간대별 바
    const timeData = Object.entries(d.byTime)
      .sort((a,b)=>b[1].건수-a[1].건수).slice(0,6);
    const maxT = timeData[0]?.[1].건수 || 1;
    const tBars = document.getElementById('time-bars-t');
    if(tBars) tBars.innerHTML = timeData.map(([k,v])=>`
      <div class="bar-item">
        <span class="bar-label">${k.length>5?k.slice(0,5)+'…':k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${v.건수/maxT*100}%;background:${v.중증도===2?'var(--red)':'var(--blue)'}"></div></div>
        <span class="bar-val">${v.건수.toLocaleString()}</span>
      </div>`).join('');
  }

  if (role==='teacher' && tab===1) {
    const zones = [
      {name:'운동장', pct:91, color:'var(--red)'},
      {name:'강당입구', pct:78, color:'var(--red)'},
      {name:'계단 A', pct:40, color:'var(--gold)'},
      {name:'계단 B', pct:22, color:'var(--blue)'},
    ];
    const zb = document.getElementById('zone-bars');
    if(zb) zb.innerHTML = zones.map(z=>`
      <div class="bar-item">
        <span class="bar-label">${z.name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${z.pct}%;background:${z.color}"></div></div>
        <span class="bar-val">${z.pct}%</span>
      </div>`).join('');

    // 기상 연동
    const years = Object.keys(d.weatherByYear).map(Number).sort();
    const latestY = years[years.length-1];
    const w = d.weatherByYear[latestY] || {};
    const wtl = document.getElementById('weather-tl');
    if(wtl) wtl.innerHTML = `
      <div class="tl-item"><div class="tl-dot gold"></div><div>
        <div class="tl-title">${latestY}년 연평균 기온 ${w.평균기온?.toFixed(1) || '-'}°C</div>
        <div class="tl-desc">결빙위험 ${w.결빙월수||0}개월 · 폭염위험 ${w.폭염월수||0}개월</div>
      </div></div>
      <div class="tl-item"><div class="tl-dot blue"></div><div>
        <div class="tl-title">연강수량 ${w.연강수량?.toFixed(0) || '-'}mm</div>
        <div class="tl-desc">미끄럼·낙상 위험 기상 조건 분석</div>
      </div></div>`;
  }

  if (role==='teacher' && tab===2) {
    setTimeout(updatePrediction, 200);
  }

  if (role==='admin' && tab===0) {
    // 연도별 차트
    const ctx = document.getElementById('chart-year');
    if(ctx) {
      if(STATE.charts.year) STATE.charts.year.destroy();
      const years = Object.keys(d.byYear).map(Number).sort();
      STATE.charts.year = new Chart(ctx, {
        type:'bar',
        data:{
          labels: years,
          datasets:[{
            label:'보상 건수',
            data: years.map(y=>d.byYear[y].건수),
            backgroundColor: years.map(y=>y===years[years.length-1]?'#e05c2a':'#5b9bd5'),
            borderRadius:4
          }]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            y:{grid:{color:'#f0f4f8'},ticks:{font:{size:10},callback:v=>v.toLocaleString()}},
            x:{grid:{display:false},ticks:{font:{size:10}}}
          }
        }
      });
    }

    // 학교급별 중증비율
    const sb = document.getElementById('school-bars');
    if(sb) {
      const schools = Object.entries(d.bySchool)
        .filter(([k])=>['고등학교','중학교','초등학교','특수학교'].includes(k))
        .map(([k,v])=>({name:k, ratio:v.중증/v.건수*100}))
        .sort((a,b)=>b.ratio-a.ratio);
      const maxR = schools[0]?.ratio || 1;
      sb.innerHTML = schools.map(s=>`
        <div class="bar-item">
          <span class="bar-label">${s.name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${s.ratio/maxR*100}%;background:${s.ratio>1?'var(--red)':'var(--blue)'}"></div></div>
          <span class="bar-val">${s.ratio.toFixed(2)}%</span>
        </div>`).join('');
    }
  }

  if (role==='admin' && tab===1) {
    // 변수 중요도
    const fiData = [
      {name:'고위험_부위', val:41.0}, {name:'남학생', val:11.6},
      {name:'학교급', val:10.7}, {name:'지역_대도시', val:6.0},
      {name:'NEDIS_w', val:2.5}, {name:'사고시간', val:1.0},
      {name:'기상변수', val:3.3}
    ].sort((a,b)=>b.val-a.val);
    const fib = document.getElementById('fi-bars');
    if(fib) fib.innerHTML = fiData.map(f=>`
      <div class="bar-item">
        <span class="bar-label">${f.name.length>7?f.name.slice(0,7)+'…':f.name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${f.val/41*100}%;background:${f.val>10?'var(--red)':f.name.includes('NEDIS')?'var(--green)':f.name.includes('기상')?'var(--gold)':'var(--blue)'}"></div></div>
        <span class="bar-val">${f.val}%</span>
      </div>`).join('');

    // 기상 요약
    const years = Object.keys(d.weatherByYear).map(Number).sort();
    const latestY = years[years.length-1];
    const w = d.weatherByYear[latestY] || {};
    const ws = document.getElementById('weather-summary');
    if(ws) ws.textContent = `${latestY}년 기준: 결빙 ${w.결빙월수||0}개월, 폭염 ${w.폭염월수||0}개월, 연강수량 ${w.연강수량?.toFixed(0)||'-'}mm`;
  }

  if (role==='admin' && tab===2) {
    // 지역별 우선순위
    const rb = document.getElementById('region-bars');
    if(rb && d.regions.length) {
      const top8 = d.regions.slice(0,8);
      const maxScore = top8[0].점수;
      rb.innerHTML = top8.map((r,i)=>`
        <div class="bar-item">
          <span class="bar-label">${r.지역}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${r.점수/maxScore*100}%;background:${i<2?'var(--red)':i<5?'var(--blue)':'var(--sky)'}"></div></div>
          <span class="bar-val">${r.점수.toFixed(2)}</span>
        </div>`).join('');
    }
  }
}

// ── 초기화 ────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  if(STATE.ghUser && STATE.ghRepo) {
    loadData();
  } else {
    setTimeout(()=>{
      document.getElementById('loading').innerHTML += `
        <p style="font-size:12px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6">
          GitHub에 데이터 파일을 업로드한 후<br>설정에서 저장소 정보를 입력하세요
        </p>`;
    }, 500);
  }
});

// 설정 버튼 초기값
document.getElementById('gh-user').value = STATE.ghUser;
document.getElementById('gh-repo').value = STATE.ghRepo;
document.getElementById('gh-branch').value = STATE.ghBranch;
</script>
</body>
</html>
